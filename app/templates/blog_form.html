{% extends "base.html" %}
{% block title %}{{ t.blog_edit_title if post else t.blog_new_title }} — Joryu{% endblock %}
{% block content %}
<div class="auth-card blog-form-card">
  <h1>{{ t.blog_edit_title if post else t.blog_new_title }}</h1>
  {% if error %}<p class="form-message form-message--error">{{ t[error] }}</p>{% endif %}
  <form method="post" action="{{ '/blog/' ~ post.slug ~ '/duzenle' if post else '/blog/yeni' }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>{{ t.blog_form_title_label }}
      <input type="text" name="title" required minlength="5" maxlength="140"
             value="{{ post.title if post else draft_title|default('') }}">
    </label>
    <label>{{ t.dash_discipline }}
      <select name="discipline">
        <option value="">—</option>
        {% for d in disciplines if d != "other" %}
        <option value="{{ d }}" {% if post and post.discipline == d %}selected{% endif %}>{{ t["discipline_" ~ d] }}</option>
        {% endfor %}
      </select>
    </label>
    <label>{{ t.blog_form_body_label }}
      <textarea name="body" rows="16" required minlength="100" maxlength="20000">{{ post.body if post else draft_body|default('') }}</textarea>
    </label>
    <p class="field-hint">{{ t.blog_form_hint }}</p>
    <button type="submit">{{ t.blog_form_submit }}</button>
  </form>
</div>
{% endblock %}
