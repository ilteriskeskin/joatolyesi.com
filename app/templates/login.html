{% extends "base.html" %}
{% block title %}{{ t.auth_login_title }} — Joryu{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>{{ t.auth_login_title }}</h1>
  {% if error %}<p class="form-message form-message--error">{{ t[error] }}</p>{% endif %}
  <form method="post" action="/login">
    <label>{{ t.auth_email }}
      <input type="email" name="email" required autocomplete="email">
    </label>
    <label>{{ t.auth_password }}
      <input type="password" name="password" required autocomplete="current-password">
    </label>
    <button type="submit">{{ t.auth_login_button }}</button>
  </form>
  <p class="auth-alt">{{ t.auth_no_account }} <a href="/register">{{ t.nav_register }}</a></p>
</div>
{% endblock %}
