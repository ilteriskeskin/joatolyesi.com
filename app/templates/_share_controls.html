{# Kompakt, temaya uygun paylaş + indir ikon butonları.
   Bekler: share_url, share_title, share_text, card_url #}
<div class="share-controls">
  <div class="share-inline">
    <button type="button" class="icon-btn" data-share data-tip="{{ t.share_button }}"
            aria-label="{{ t.share_button }}"
            data-share-url="{{ share_url }}"
            data-share-title="{{ share_title }}"
            data-share-text="{{ share_text }}">
      <svg viewBox="0 0 24 24" class="icon-btn__svg" aria-hidden="true">
        <circle cx="6" cy="12" r="2.3"/>
        <circle cx="18" cy="5.5" r="2.3"/>
        <circle cx="18" cy="18.5" r="2.3"/>
        <line x1="8.1" y1="10.9" x2="15.9" y2="6.9"/>
        <line x1="8.1" y1="13.1" x2="15.9" y2="17.1"/>
      </svg>
    </button>
    <div class="share-menu">
      <a target="_blank" rel="noopener" href="https://twitter.com/intent/tweet?text={{ share_text|urlencode }}&url={{ share_url|urlencode }}">X (Twitter)</a>
      <a target="_blank" rel="noopener" href="https://wa.me/?text={{ (share_text ~ ' ' ~ share_url)|urlencode }}">WhatsApp</a>
    </div>
  </div>
  <a class="icon-btn" href="{{ card_url }}" download data-tip="{{ t.share_download }}" aria-label="{{ t.share_download }}">
    <svg viewBox="0 0 24 24" class="icon-btn__svg" aria-hidden="true">
      <path d="M12 3.5v11M7.5 10.5 12 15l4.5-4.5"/>
      <path d="M5 18.5h14"/>
    </svg>
  </a>
</div>
