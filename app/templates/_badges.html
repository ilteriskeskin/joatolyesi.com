<div class="belt-rack">
  {% for b in belts %}
  <span class="belt belt--{{ b.id }}{% if not b.earned %} belt--locked{% endif %}"
        tabindex="0" data-tip="{{ b.tip(t) }}">
    {% include "_belt_svg.html" %}
    <span class="belt__label">{{ b.label(t) }}</span>
  </span>
  {% endfor %}
</div>

{% if badges %}
<div class="achievement-grid">
  {% for b in badges %}
  <span class="achievement{% if not b.earned %} achievement--locked{% endif %}"
        tabindex="0" data-tip="{{ b.tip(t) }}">
    <span class="achievement__num">{{ b.threshold }}</span>
    <span class="achievement__label">{{ b.label(t) }}</span>
  </span>
  {% endfor %}
</div>
{% endif %}
