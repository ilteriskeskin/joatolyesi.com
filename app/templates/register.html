{% extends "base.html" %}
{% block title %}{{ t.auth_register_title }} — Joryu{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>{{ t.auth_register_title }}</h1>
  {% if error %}<p class="form-message form-message--error">{{ t[error] }}</p>{% endif %}
  <form method="post" action="/register">
    <label>{{ t.auth_email }}
      <input type="email" name="email" required autocomplete="email">
    </label>
    <label>{{ t.profile_username }}
      <input type="text" name="username" required minlength="3" maxlength="30"
             pattern="[a-z0-9][a-z0-9-]+[a-z0-9]" autocomplete="username">
      <span class="field-hint">{{ t.profile_username_hint }}</span>
    </label>
    <label>{{ t.profile_discipline }}
      <select name="discipline">
        {% for d in disciplines %}
        <option value="{{ d }}">{{ t["discipline_" ~ d] }}</option>
        {% endfor %}
      </select>
    </label>
    <label>{{ t.auth_password }}
      <input type="password" name="password" required minlength="8" autocomplete="new-password">
    </label>
    <button type="submit">{{ t.auth_register_button }}</button>
  </form>
  <p class="auth-alt">{{ t.auth_have_account }} <a href="/login">{{ t.nav_login }}</a></p>
</div>
{% endblock %}
