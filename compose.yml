services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # 512MB'lık VPS için: varsayılan shared_buffers (128MB) + max_connections (100)
    # tek başına RAM'in çoğunu ayırır. Bu ölçekte gerçek trafik küçük, düşürülmesi
    # güvenli — pool app tarafında zaten 5 bağlantıyla sınırlı (app/db.py).
    command: >
      postgres -c shared_buffers=48MB -c max_connections=20
      -c effective_cache_size=128MB -c work_mem=4MB -c maintenance_work_mem=32MB
    volumes:
      - joryu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    # CI (GitHub Actions) her main push'unda bu imajı yayınlar.
    # Sunucuda deploy: docker compose pull app && docker compose up -d
    # Lokal geliştirme: docker compose up -d --build (build: fallback'i kullanır)
    image: ghcr.io/ilteriskeskin/joryu:latest
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Sadece localhost — dışarıya nginx reverse proxy üzerinden çıkar
      - "127.0.0.1:8000:8000"

volumes:
  joryu_pgdata:
